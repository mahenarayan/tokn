name: Release

on:
  release:
    types:
      - published

permissions:
  attestations: write
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run verification
        run: npm run check

      - name: Verify package contents
        run: npm run pack:check

      - name: Pack release artifact
        id: pack
        run: |
          rm -rf artifacts
          mkdir -p artifacts
          npm pack --pack-destination ./artifacts
          printf 'tgz=%s\n' artifacts/*.tgz >> "$GITHUB_OUTPUT"

      - name: Upload packed artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-package
          path: ${{ steps.pack.outputs.tgz }}

      - name: Attest packed artifact
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.pack.outputs.tgz }}

      - name: Publish to npm
        run: npm publish --access public --provenance "${{ steps.pack.outputs.tgz }}"
