name: Release

on:
  release:
    types:
      - published

permissions:
  attestations: write
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify release tag matches package version
        run: |
          name="$(node -e "process.stdout.write(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name)")"
          version="$(node -e "process.stdout.write(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")"
          if [[ "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "Release tag $GITHUB_REF_NAME does not match package version v$version" >&2
            exit 1
          fi
          printf 'name=%s\nversion=%s\n' "$name" "$version" >> "$GITHUB_ENV"

      - name: Verify npm version is unpublished
        run: |
          if npm view "$name@$version" version >/tmp/npm-version.txt 2>/tmp/npm-view.err; then
            echo "$name@$version is already published on npm." >&2
            cat /tmp/npm-version.txt >&2
            exit 1
          fi

          if ! grep -q 'E404' /tmp/npm-view.err; then
            cat /tmp/npm-view.err >&2
            exit 1
          fi

      - name: Run verification
        run: npm run check

      - name: Audit dependency advisories
        run: npm run security:audit

      - name: Verify package contents
        run: npm run pack:check

      - name: Pack release artifact
        id: pack
        run: |
          rm -rf artifacts
          mkdir -p artifacts
          npm pack --pack-destination ./artifacts
          printf 'tgz=%s\n' artifacts/*.tgz >> "$GITHUB_OUTPUT"

      - name: Upload packed artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package
          path: ${{ steps.pack.outputs.tgz }}

      - name: Attest packed artifact
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.pack.outputs.tgz }}

      - name: Publish to npm
        run: npm publish "${{ steps.pack.outputs.tgz }}" --access public
